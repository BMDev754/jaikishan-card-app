<!DOCTYPE html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Jaykisan Card web app" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Jaykisan Card</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>

  <body>
    <div id="flutter_target" style="width: 100%; height: 100vh;"></div>
    
    <!-- Flutter loader script -->
    <script src="flutter.js" defer></script>
    <script>
      window.addEventListener('load', function(ev) {
        // Download main.dart.js
        _flutter.loader.loadEntrypoint({
          serviceWorker: {
            serviceWorkerVersion: null,
          },
          onEntrypointLoaded: async function(engineInitializer) {
            let appRunner = await engineInitializer.initializeEngine();
            await appRunner.runApp();
          }
        });
      });</script>

    <noscript>
      This application requires JavaScript to run.
    </noscript>

    <flt-platform-view></flt-platform-view>
  </body>
</html>
